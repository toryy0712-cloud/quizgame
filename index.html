<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산지 퀴즈 부스</title>
    <link rel="icon" href="mountain-quiz.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="mountain-quiz.png">

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-size: 1.1rem; 
            background-image: url('mountain-quiz.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            height: auto;
            margin: 0; 
            color: white; 
            overflow-y: auto; 
        }

        #admin-btn {
            position: fixed; 
            top: 15px; 
            left: 15px;
            background-color: #34495e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.3s;
            z-index: 1000;
        }
        #admin-btn:hover { background-color: #2c3e50; }

        .quiz-container { 
            background-color: rgba(255, 255, 255, 0.95); 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 650px; 
            padding: 3rem; 
            text-align: center; 
            color: black; 
            margin: 100px auto 400px auto; 
        }
        h1 { color: #2c3e50; margin-bottom: 1.5rem; font-size: 2.2rem; }
        
        #quiz-image {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 8px;
            display: none; 
        }

        #question { 
            font-size: 1.6rem; 
            font-weight: 600;
            color: #34495e;
            margin-bottom: 30px; 
        }

        #options {
            max-height: 400px; 
            overflow-y: auto;
            padding-right: 10px;
        }

        .btn { 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 15px 20px; 
            margin: 10px 0; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            width: 100%; 
            transition: background-color 0.3s, transform 0.1s; 
        }
        .btn:hover { background-color: #2980b9; }
        .btn:active { transform: scale(0.98); }
        
        #result { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #e74c3c;
            margin-top: 20px; 
            display: none; 
        }
        #restart { display: none; margin-top: 30px; background-color: #2ecc71; font-size: 1.3rem;}
        #restart:hover { background-color: #27ae60; }
        #loading { font-size: 1.5rem; color: #7f8c8d; font-weight: bold; }

        #start-btn {
            background-color: #f39c12;
            font-size: 1.4rem;
            padding: 20px 30px;
            margin-top: 25px;
            font-weight: bold;
        }
        #start-btn:hover { background-color: #e67e22; }
        #start-screen p { font-size: 1.3rem; color: #555; }

        /* 모달 레이아웃 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; 
            flex-direction: column; 
            align-items: center; 
            overflow-y: auto; 
            z-index: 1002; 
            padding: 3rem 0; 
            box-sizing: border-box;
        }

        .modal-content {
            background: white; padding: 2.5rem; border-radius: 10px;
            width: 90%; max-width: 500px; text-align: center;
            color: black;
            margin: auto; 
            flex-shrink: 0;
        }

        .admin-panel {
            background: white; padding: 2rem; border-radius: 10px;
            width: 90%; max-width: 800px; 
            display: flex; flex-direction: column;
            color: black;
            margin: auto; 
            flex-shrink: 0; 
        }
        
        .quiz-list-container {
            max-height: 250px; 
            flex-shrink: 0;
            overflow-y: auto; 
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            background: #fdfdfd;
        }
        .quiz-item {
            border-bottom: 1px solid #eee; padding: 15px 0;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.1rem;
        }
        .quiz-item:last-child { border-bottom: none; }
        .quiz-info { flex-grow: 1; }
        
        /* 버튼 컨테이너 및 수정/삭제 버튼 스타일 */
        .action-btns { display: flex; gap: 5px; }
        .edit-btn { background-color: #f39c12; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .edit-btn:hover { background-color: #d68910; }
        .delete-btn { background-color: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .delete-btn:hover { background-color: #c0392b; }
        
        .add-form { display: flex; flex-direction: column; gap: 12px; text-align: left; }
        .add-form input[type="text"] { padding: 12px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 1.1rem; }
        #new-image { padding: 5px; font-size: 1rem; } 
        
        #options-wrapper {
            max-height: 220px; 
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f9f9f9;
        }

        .add-btn { background-color: #2ecc71; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 1.2rem; }
        .add-btn:hover { background-color: #27ae60; }
        .close-admin { background-color: #95a5a6; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; margin-top: 10px; font-size: 1.1rem; }
        
        #add-option-btn { background-color: #9b59b6; margin-bottom: 15px; width: auto; align-self: flex-start; padding: 10px 18px; font-size: 1rem; }
        #add-option-btn:hover { background-color: #8e44ad; }
        
        /* 수정 모드 알림 영역 */
        #edit-mode-indicator {
            display: none;
            background-color: #fdf5e6;
            border: 1px solid #f39c12;
            color: #d68910;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <button id="admin-btn">⚙️ 관리자</button>

    <div class="quiz-container">
        <h1>✨ 산지 퀴즈</h1>
        <div id="loading">퀴즈를 불러오는 중입니다...</div>
        
        <div id="start-screen" style="display: none;">
            <p>준비되셨나요? 아래 버튼을 눌러 퀴즈를 시작하세요!</p>
            <button id="start-btn" class="btn">산지 퀴즈 시작하기</button>
        </div>
        
        <div id="quiz" style="display: none;">
            <img id="quiz-image" src="" alt="퀴즈 이미지">
            <div id="question">질문이 여기에 표시됩니다.</div>
            <div id="options"></div>
        </div>
        <div id="result"></div>
        <button id="restart" class="btn">처음부터 다시 하기</button>
    </div>

    <div id="password-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>관리자 인증</h2>
            <input type="password" id="admin-pw" placeholder="비밀번호 입력" style="padding: 15px; width: 80%; margin-bottom: 20px; font-size: 1.1rem;">
            <br>
            <button class="btn" id="pw-submit-btn" style="width: auto; padding: 12px 25px;">확인</button>
            <button class="btn" id="pw-cancel-btn" style="width: auto; padding: 12px 25px; background-color: #95a5a6;">취소</button>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay">
        <div class="admin-panel">
            <h2>🛠️ 관리자 모드</h2>
            
            <div class="quiz-list-container" id="quiz-list">
                </div>

            <div class="add-form">
                <div id="edit-mode-indicator" style="display: none;">
                    <span>⚠️ 현재 퀴즈를 <strong>수정 중</strong>입니다.</span>
                    <button type="button" id="cancel-edit-btn" class="btn" style="width: auto; margin: 0; padding: 5px 15px; background-color: #e74c3c;">수정 취소</button>
                </div>

                <input type="text" id="new-question" placeholder="질문을 입력하세요">
                <input type="file" id="new-image" accept="image/*">
                <small style="color: #666; margin-top: -8px;">(※ 이미지를 새로 올리지 않으면 기존 이미지가 유지됩니다.)</small>
                
                <div style="font-weight: bold; margin-top: 10px; font-size: 1.1rem;">선택지 (정답인 항목의 동그라미를 체크하세요)</div>
                <div id="options-wrapper"></div>
                <button type="button" class="btn" id="add-option-btn">+ 선택지 추가</button>
                
                <button class="add-btn" id="add-quiz-btn">새 퀴즈 추가하기</button>
            </div>
            
            <button class="close-admin" id="close-admin-btn">닫기</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const SUPABASE_URL = 'https://nyntxjsbswyhumgnwnmg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55bnR4anNic3d5aHVtZ253bm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2Nzg0MDksImV4cCI6MjA5OTI1NDQwOX0.dD5xhlttjYwcnD2qdRzQCtQyDDa973A3-JppmNSSGnA';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let allQuizzes = []; 
        let currentPlayQueue = []; 
        let currentQuestionIndex = 0;
        let score = 0;

        // --- 수정 모드를 위한 변수 추가 ---
        let editingQuizId = null;
        let existingImageUrl = "";
        // ---------------------------------

        const loadingEl = document.getElementById("loading");
        const startScreenEl = document.getElementById("start-screen"); 
        const startBtn = document.getElementById("start-btn"); 
        const quizDiv = document.getElementById("quiz");
        const quizImageEl = document.getElementById("quiz-image"); 
        const questionEl = document.getElementById("question");
        const optionsEl = document.getElementById("options");
        const resultEl = document.getElementById("result");
        const restartBtn = document.getElementById("restart");

        const adminBtn = document.getElementById("admin-btn");
        const pwModal = document.getElementById("password-modal");
        const adminModal = document.getElementById("admin-modal");
        const pwInput = document.getElementById("admin-pw");
        const quizListEl = document.getElementById("quiz-list");
        
        const addQuizBtn = document.getElementById("add-quiz-btn");
        const optionsWrapper = document.getElementById("options-wrapper");
        const addOptionBtn = document.getElementById("add-option-btn");
        const cancelEditBtn = document.getElementById("cancel-edit-btn");
        const editModeIndicator = document.getElementById("edit-mode-indicator");
        let optionCount = 0;

        // 배열을 무작위로 섞는 함수 (가장 확실한 While문 + ES6 방식 적용)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        async function fetchQuizzes() {
            try {
                const { data, error } = await supabase.from('quizzes').select('*');
                if (error) throw error;
                
                allQuizzes = data || [];
                initStartScreen(); 
            } catch (e) {
                console.error("데이터 로드 실패:", e);
                loadingEl.innerText = "퀴즈를 불러올 수 없습니다. 오류: " + e.message;
            }
        }

        function initStartScreen() {
            loadingEl.style.display = "none";
            quizDiv.style.display = "none";
            resultEl.style.display = "none";
            restartBtn.style.display = "none";
            
            if(allQuizzes.length === 0) {
                quizDiv.style.display = "block";
                questionEl.innerText = "현재 등록된 퀴즈가 없습니다. 관리자 모드에서 추가해주세요.";
                quizImageEl.style.display = "none";
                optionsEl.innerHTML = "";
                return;
            }
            
            startScreenEl.style.display = "block";
        }

        startBtn.onclick = () => {
            startScreenEl.style.display = "none";
            startQuiz();
        };

        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            quizDiv.style.display = "block";
            
            // 문제 순서 무작위 섞기
            currentPlayQueue = JSON.parse(JSON.stringify(allQuizzes));
            shuffleArray(currentPlayQueue);

            loadQuestion();
        }

        function loadQuestion() {
            const currentQuiz = currentPlayQueue[currentQuestionIndex];
            questionEl.innerText = currentQuiz.question;
            
            if (currentQuiz.imageUrl && currentQuiz.imageUrl.trim() !== "") {
                quizImageEl.src = currentQuiz.imageUrl;
                quizImageEl.style.display = "inline-block";
            } else {
                quizImageEl.src = "";
                quizImageEl.style.display = "none";
            }

            let optionsWithAnswer = currentQuiz.options.map((opt, idx) => ({
                text: opt,
                isCorrect: idx === parseInt(currentQuiz.answer)
            }));

            // 선택지 섞기 실행
            shuffleArray(optionsWithAnswer);

            optionsEl.innerHTML = "";
            optionsWithAnswer.forEach(opt => {
                const button = document.createElement("button");
                button.innerText = opt.text;
                button.classList.add("btn");
                button.onclick = () => selectAnswer(opt.isCorrect);
                optionsEl.appendChild(button);
            });
        }

        function selectAnswer(isCorrect) {
            if (isCorrect) score++;
            currentQuestionIndex++;
            
            if (currentQuestionIndex < currentPlayQueue.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            quizDiv.style.display = "none";
            resultEl.style.display = "block";
            resultEl.innerHTML = `수고하셨습니다!<br>총 ${currentPlayQueue.length}문제 중 <span style="color:#2ecc71">${score}</span>문제를 맞췄습니다.`;
            restartBtn.style.display = "block";
        }
        
        restartBtn.onclick = initStartScreen; 

        adminBtn.onclick = () => { 
            pwModal.style.display = "flex"; 
            pwInput.value = ""; 
            document.body.style.overflow = "hidden"; 
        };
        
        document.getElementById("pw-cancel-btn").onclick = () => { 
            pwModal.style.display = "none"; 
            document.body.style.overflow = "auto"; 
        };

        document.getElementById("pw-submit-btn").onclick = () => {
            if (pwInput.value === "050126") {
                pwModal.style.display = "none";
                adminModal.style.display = "flex";
                resetForm(); // 관리자 열 때 폼 초기화
                renderAdminList();
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        };

        document.getElementById("close-admin-btn").onclick = () => {
            adminModal.style.display = "none";
            document.body.style.overflow = "auto"; 
            resetForm();
            fetchQuizzes(); 
        };

        function renderAdminList() {
            quizListEl.innerHTML = "";
            if (allQuizzes.length === 0) {
                quizListEl.innerHTML = "<p>등록된 퀴즈가 없습니다.</p>";
                return;
            }
            
            allQuizzes.forEach((q) => {
                const div = document.createElement("div");
                div.className = "quiz-item";
                const imgIcon = (q.imageUrl && q.imageUrl.trim() !== "") ? " 🖼️" : "";
                div.innerHTML = `
                    <div class="quiz-info">
                        <strong>Q: ${q.question}${imgIcon}</strong><br>
                        <span style="font-size: 1rem; color: #555;">정답: ${q.options[q.answer]}</span>
                    </div>
                    <div class="action-btns">
                        <button class="edit-btn" data-id="${q.id}">수정</button>
                        <button class="delete-btn" data-id="${q.id}">삭제</button>
                    </div>
                `;
                quizListEl.appendChild(div);
            });

            // 수정 버튼 이벤트 연결
            document.querySelectorAll(".edit-btn").forEach(btn => {
                btn.onclick = (e) => {
                    const id = e.target.getAttribute("data-id");
                    const targetQuiz = allQuizzes.find(quiz => quiz.id == id);
                    if (targetQuiz) {
                        enableEditMode(targetQuiz);
                    }
                };
            });

            // 삭제 버튼 이벤트 연결
            document.querySelectorAll(".delete-btn").forEach(btn => {
                btn.onclick = async (e) => {
                    const id = e.target.getAttribute("data-id");
                    if(confirm("이 퀴즈를 삭제하시겠습니까?")) {
                        try {
                            const { error } = await supabase.from('quizzes').delete().eq('id', id);
                            if (error) throw error;
                            
                            alert("삭제되었습니다.");
                            
                            // 만약 삭제하려는 문제가 현재 수정 중인 문제라면 폼을 초기화
                            if (editingQuizId == id) resetForm();

                            await fetchQuizzes(); 
                            renderAdminList();
                        } catch (err) {
                            alert("삭제 실패! 원인: " + err.message);
                        }
                    }
                };
            });
        }

        // --- 수정 모드 활성화 함수 ---
        function enableEditMode(quiz) {
            editingQuizId = quiz.id;
            existingImageUrl = quiz.imageUrl || "";

            document.getElementById("new-question").value = quiz.question;
            document.getElementById("new-image").value = ""; // 파일 첨부는 비워둠 (보안상)

            optionsWrapper.innerHTML = "";
            optionCount = 0;
            
            // 기존 선택지 데이터 채우기
            quiz.options.forEach((optText, index) => {
                createOptionInput(optText, index === quiz.answer);
            });

            // UI 변경
            editModeIndicator.style.display = "flex";
            addQuizBtn.innerText = "수정 완료";
            addQuizBtn.style.backgroundColor = "#f39c12"; // 주황색으로 변경

            // 폼 쪽으로 스크롤 이동
            document.querySelector('.admin-panel').scrollTo({
                top: document.querySelector('.admin-panel').scrollHeight,
                behavior: 'smooth'
            });
        }

        // --- 폼 초기화 함수 ---
        function resetForm() {
            editingQuizId = null;
            existingImageUrl = "";
            document.getElementById("new-question").value = "";
            document.getElementById("new-image").value = ""; 
            
            optionsWrapper.innerHTML = "";
            optionCount = 0;
            createOptionInput(); createOptionInput(); createOptionInput(); createOptionInput();

            editModeIndicator.style.display = "none";
            addQuizBtn.innerText = "새 퀴즈 추가하기";
            addQuizBtn.style.backgroundColor = "#2ecc71"; // 원래 초록색
            addQuizBtn.disabled = false;
        }

        // 수정 취소 버튼
        cancelEditBtn.onclick = resetForm;

        // 선택지 생성 함수 (기존 데이터 채우기 기능 추가)
        function createOptionInput(text = "", isCorrect = null) {
            const div = document.createElement("div");
            div.style.display = "flex";
            div.style.alignItems = "center";
            div.style.gap = "10px";
            div.style.marginBottom = "8px";
            
            const radio = document.createElement("input");
            radio.type = "radio";
            radio.name = "correct-answer";
            radio.value = optionCount;
            
            // 초기 세팅 혹은 수정 모드 시 정답 체크
            if (isCorrect === true) {
                radio.checked = true;
            } else if (isCorrect === null && optionCount === 0) {
                radio.checked = true; 
            }

            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = `선택지 ${optionCount + 1}`;
            input.className = "opt-input";
            input.value = text;
            
            const delBtn = document.createElement("button");
            delBtn.innerText = "X";
            delBtn.style.background = "#e74c3c";
            delBtn.style.color = "white";
            delBtn.style.border = "none";
            delBtn.style.padding = "10px 15px";
            delBtn.style.cursor = "pointer";
            delBtn.style.borderRadius = "4px";
            delBtn.style.fontWeight = "bold";
            
            delBtn.onclick = () => {
                if (optionsWrapper.children.length > 2) {
                    optionsWrapper.removeChild(div);
                    updateRadioValues();
                } else {
                    alert("최소 2개의 선택지가 필요합니다.");
                }
            };

            div.appendChild(radio);
            div.appendChild(input);
            div.appendChild(delBtn);
            optionsWrapper.appendChild(div);
            optionCount++;
            updateRadioValues();
        }

        function updateRadioValues() {
            const rows = optionsWrapper.children;
            for(let i=0; i<rows.length; i++) {
                const radio = rows[i].querySelector("input[type='radio']");
                radio.value = i;
                const input = rows[i].querySelector("input[type='text']");
                input.placeholder = `선택지 ${i + 1}`;
            }
            optionCount = rows.length;
        }

        addOptionBtn.onclick = () => createOptionInput();

        // 등록 및 수정 버튼 클릭 이벤트 통합
        addQuizBtn.onclick = async () => {
            const qInput = document.getElementById("new-question").value;
            const imageFile = document.getElementById("new-image").files[0];
            
            const optInputs = document.querySelectorAll(".opt-input");
            const options = [];
            let isValid = true;
            optInputs.forEach(input => {
                if(!input.value) isValid = false;
                options.push(input.value);
            });

            const checkedRadio = document.querySelector("input[name='correct-answer']:checked");

            if(!qInput || !isValid || !checkedRadio) {
                alert("질문과 모든 선택지를 채워주세요!");
                return;
            }

            addQuizBtn.innerText = editingQuizId ? "수정 중..." : "업로드 중...";
            addQuizBtn.disabled = true;

            try {
                // 수정 시 새 이미지를 첨부하지 않으면 기존 이미지 유지
                let finalImageUrl = editingQuizId ? existingImageUrl : "";
                
                if (imageFile) {
                    const fileExt = imageFile.name.split('.').pop();
                    const fileName = `${Date.now()}.${fileExt}`;
                    
                    const { error: uploadError } = await supabase.storage
                        .from('quiz_images')
                        .upload(fileName, imageFile);
                        
                    if (uploadError) throw uploadError;

                    const { data: publicUrlData } = supabase.storage
                        .from('quiz_images')
                        .getPublicUrl(fileName);
                        
                    finalImageUrl = publicUrlData.publicUrl;
                }

                const quizData = {
                    question: qInput,
                    imageUrl: finalImageUrl, 
                    options: options, 
                    answer: parseInt(checkedRadio.value)
                };

                if (editingQuizId) {
                    // 수정 모드 (Update)
                    const { error: updateError } = await supabase
                        .from('quizzes')
                        .update(quizData)
                        .eq('id', editingQuizId);
                    if (updateError) throw updateError;
                    alert("퀴즈가 성공적으로 수정되었습니다!");
                } else {
                    // 추가 모드 (Insert)
                    const { error: insertError } = await supabase
                        .from('quizzes')
                        .insert([quizData]);
                    if (insertError) throw insertError;
                    alert("새 퀴즈가 추가되었습니다!");
                }

                // 처리 완료 후 폼 비우고 목록 리로드
                resetForm();
                await fetchQuizzes(); 
                renderAdminList();
            } catch (err) {
                alert("처리 실패! 원인: " + err.message);
                addQuizBtn.innerText = editingQuizId ? "수정 완료" : "새 퀴즈 추가하기";
                addQuizBtn.disabled = false;
            }
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker 등록 성공:', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker 등록 실패:', error);
                    });
            });
        }

        fetchQuizzes();
    </script>
</body>
</html>
